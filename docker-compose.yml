version: '3.8'
services:
  tarocchai-app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./engine:/app/engine
      - ./app.py:/app/app.py
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
